<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Make a Wish • Nithya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --lavender: #E6E6FA;
            --deep-purple: #1a0b2e;
            --gold: #d4af37;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, var(--deep-purple) 0%, #05020a 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            touch-action: none; /* Prevents scrolling while swiping */
        }

        /* 3D Scene Container */
        #cake-container { position: absolute; inset: 0; z-index: 10; }

        /* Magical Swipe Canvas */
        #swipe-canvas {
            position: absolute; inset: 0; z-index: 20; pointer-events: none;
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute; inset: 0; z-index: 30;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 2rem;
        }

        .title-box {
            text-align: center; margin-top: 5vh;
        }
        .title-box h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            color: var(--lavender);
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(230, 230, 250, 0.4);
            font-weight: 400;
        }
        .title-box p {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--gold);
            margin-top: -10px;
        }

        .instruction {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 230, 250, 0.2); border-radius: 50px;
            padding: 12px 32px; font-family: 'Montserrat', sans-serif;
            color: white; font-size: 0.9rem; letter-spacing: 0.3em;
            text-transform: uppercase; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .instruction span { animation: swipeAnim 2s infinite ease-in-out; display: inline-block; }
        @keyframes swipeAnim {
            0% { transform: translateX(-15px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(15px); opacity: 0; }
        }

        /* Celebration Screen */
        #celebration {
            position: absolute; inset: 0; z-index: 40; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0.9);
        }
        #celebration h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(5rem, 15vw, 12rem);
            background: linear-gradient(to bottom, #fff, var(--lavender));
            -webkit-background-clip: text; color: transparent;
            line-height: 1; text-shadow: 0 0 50px rgba(230, 230, 250, 0.4);
            margin: 0;
        }
        #celebration h3 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            letter-spacing: 0.4em; color: var(--gold);
            margin: 0; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .back-btn {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            color: rgba(255,255,255,0.5); font-family: 'Cinzel', serif;
            font-size: 0.8rem; letter-spacing: 0.2em; text-decoration: none;
            transition: color 0.3s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>

    <audio id="magic-swipe" src="https://assets.mixkit.co/sfx/preview/2754/2754-preview.mp3" preload="auto"></audio>
    <audio id="bday-song" src="https://cdn.pixabay.com/audio/2022/10/05/audio_68629e7695.mp3" preload="auto" loop></audio>

    <a href="home.html" class="back-btn">← RETURN</a>

    <div class="ui-layer" id="ui-layer">
        <div class="title-box">
            <h1 class="fade-in">MAKE A WISH</h1>
            <p class="fade-in">and swipe to cut</p>
        </div>
        <div class="instruction fade-in">
            Swipe Across <span>✨</span>
        </div>
    </div>

    <div id="celebration">
        <h2>Happy Birthday</h2>
        <h3>NITHYA</h3>
    </div>

    <div id="cake-container"></div>
    <canvas id="swipe-canvas"></canvas>

    <script>
        const isMobile = window.innerWidth < 768;

        // ==========================================
        // 1. THREE.JS SCENE SETUP (Ultra-Optimized)
        // ==========================================
        const container = document.getElementById('cake-container');
        const scene = new THREE.Scene();
        
        // Dynamic camera placement based on screen size
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 6, isMobile ? 16 : 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Soft, elegant lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // ==========================================
        // 2. THE SIMPLE LAVENDER CAKE
        // ==========================================
        const cakeRadius = 3;
        const cakeHeight = 2.5;
        const lavenderColor = 0xE6E6FA;
        const spongeColor = 0xFFF5E1; // Vanilla inside
        
        const cakeGroup = new THREE.Group();
        scene.add(cakeGroup);

        // We build the cake in two pre-cut halves so it splits perfectly!
        const leftHalf = new THREE.Group();
        const rightHalf = new THREE.Group();
        cakeGroup.add(leftHalf);
        cakeGroup.add(rightHalf);

        // Materials
        const icingMat = new THREE.MeshStandardMaterial({ color: lavenderColor, roughness: 0.6 });
        const spongeMat = new THREE.MeshStandardMaterial({ color: spongeColor, roughness: 0.9 });
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2 });

        // Geometries
        const halfCylGeoLeft = new THREE.CylinderGeometry(cakeRadius, cakeRadius, cakeHeight, 32, 1, false, Math.PI/2, Math.PI);
        const halfCylGeoRight = new THREE.CylinderGeometry(cakeRadius, cakeRadius, cakeHeight, 32, 1, false, -Math.PI/2, Math.PI);
        const innerPlaneGeo = new THREE.PlaneGeometry(cakeRadius * 2, cakeHeight);
        
        // Build Left Half
        const leftIcing = new THREE.Mesh(halfCylGeoLeft, icingMat);
        const leftInside = new THREE.Mesh(innerPlaneGeo, spongeMat);
        leftInside.rotation.y = Math.PI / 2; // Face right
        leftHalf.add(leftIcing);
        leftHalf.add(leftInside);

        // Build Right Half
        const rightIcing = new THREE.Mesh(halfCylGeoRight, icingMat);
        const rightInside = new THREE.Mesh(innerPlaneGeo, spongeMat);
        rightInside.rotation.y = -Math.PI / 2; // Face left
        rightHalf.add(rightIcing);
        rightHalf.add(rightInside);

        // Elegant Gold Base Rings
        const ringGeo = new THREE.TorusGeometry(cakeRadius + 0.05, 0.1, 16, 32, Math.PI);
        const leftRing = new THREE.Mesh(ringGeo, goldMat);
        leftRing.rotation.x = Math.PI / 2; leftRing.rotation.z = Math.PI / 2; leftRing.position.y = -cakeHeight/2 + 0.1;
        leftHalf.add(leftRing);
        
        const rightRing = new THREE.Mesh(ringGeo, goldMat);
        rightRing.rotation.x = Math.PI / 2; rightRing.rotation.z = -Math.PI / 2; rightRing.position.y = -cakeHeight/2 + 0.1;
        rightHalf.add(rightRing);

        // The Candle (Attached to right half)
        const candleGroup = new THREE.Group();
        candleGroup.position.set(0.3, cakeHeight/2, 0); // Slightly offset
        rightHalf.add(candleGroup);

        const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.2, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        candleBody.position.y = 0.6;
        candleGroup.add(candleBody);

        // Candle Flame (Glowing Sphere)
        const flame = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 16, 16), 
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.9 })
        );
        flame.position.y = 1.3;
        candleGroup.add(flame);
        
        const candleLight = new THREE.PointLight(0xffaa00, 2, 10);
        candleLight.position.y = 1.3;
        candleGroup.add(candleLight);

        // Gentle floating animation before cut
        gsap.to(cakeGroup.position, { y: 0.3, duration: 2, yoyo: true, repeat: -1, ease: "sine.inOut" });

        // ==========================================
        // 3. MAGICAL SWIPE TRAIL (Canvas 2D)
        // ==========================================
        const swipeCanvas = document.getElementById('swipe-canvas');
        const ctx = swipeCanvas.getContext('2d');
        let width, height;
        
        function resizeCanvas() {
            width = swipeCanvas.width = window.innerWidth;
            height = swipeCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        resizeCanvas();

        let isDrawing = false;
        let points = [];
        let hasCut = false;

        // Listeners for swipe
        window.addEventListener('pointerdown', (e) => {
            if(hasCut) return;
            isDrawing = true;
            points = [];
            points.push({ x: e.clientX, y: e.clientY, age: 0 });
            
            // Initialize Audio safely on first touch
            document.getElementById('bday-song').load();
            document.getElementById('magic-swipe').load();
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing || hasCut) return;
            points.push({ x: e.clientX, y: e.clientY, age: 0 });
            
            // Logic to detect if they swiped across the center
            if (points.length > 5) {
                const start = points[0];
                const current = points[points.length - 1];
                const dx = Math.abs(current.x - start.x);
                const dy = Math.abs(current.y - start.y);
                
                // If swipe is long enough, trigger cut
                if (dx > window.innerWidth * 0.4 || dy > window.innerHeight * 0.3) {
                    triggerCut();
                }
            }
        });

        window.addEventListener('pointerup', () => { isDrawing = false; });

        function drawTrail() {
            ctx.clearRect(0, 0, width, height);
            if (points.length < 2) return;

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
                points[i].age++; // Age the points so they fade out
            }

            // Glowing magic line
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 8;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#E6E6FA';
            ctx.stroke();

            // Remove old points to create tail
            points = points.filter(p => p.age < 15);
        }

        // ==========================================
        // 4. THE GRAND CUT & CELEBRATION
        // ==========================================
        function triggerCut() {
            hasCut = true;
            isDrawing = false;

            // Play sound
            const swoosh = document.getElementById('magic-swipe');
            swoosh.volume = 0.5;
            swoosh.play().catch(e=>{});

            // Blow out candle
            gsap.to(flame.scale, { x: 0, y: 0, z: 0, duration: 0.2 });
            gsap.to(candleLight, { intensity: 0, duration: 0.2 });

            // Split the cake!
            gsap.to(leftHalf.position, { x: -2.5, duration: 2.5, ease: "power3.out" });
            gsap.to(rightHalf.position, { x: 2.5, duration: 2.5, ease: "power3.out" });
            gsap.to(leftHalf.rotation, { z: 0.15, y: -0.2, duration: 2.5, ease: "power3.out" });
            gsap.to(rightHalf.rotation, { z: -0.15, y: 0.2, duration: 2.5, ease: "power3.out" });

            // Fade out UI
            gsap.to('#ui-layer', { opacity: 0, duration: 1 });

            // Launch Celebration
            setTimeout(() => {
                // Play Song
                const song = document.getElementById('bday-song');
                song.volume = 0.7;
                song.play().catch(e=>{});

                // Move Camera Closer
                gsap.to(camera.position, { z: isMobile ? 12 : 9, y: 4, duration: 3, ease: "power2.inOut" });

                // Show Text
                gsap.to('#celebration', { opacity: 1, scale: 1, duration: 2, ease: "elastic.out(1, 0.5)" });

                // Confetti Explosion
                const duration = 15 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

                function randomInRange(min, max) { return Math.random() * (max - min) + min; }

                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return clearInterval(interval);
                    
                    const particleCount = 50 * (timeLeft / duration);
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                        colors: ['#E6E6FA', '#d4af37', '#ffffff']
                    }));
                    confetti(Object.assign({}, defaults, { 
                        particleCount, 
                        origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                        colors: ['#E6E6FA', '#d4af37', '#ffffff']
                    }));
                }, 250);

            }, 500);
        }

        // ==========================================
        // 5. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            drawTrail();

            // Make flame flicker slightly before cut
            if(!hasCut) {
                flame.scale.setScalar(1 + Math.sin(Date.now() * 0.01) * 0.1);
                candleLight.intensity = 2 + Math.sin(Date.now() * 0.01) * 0.2;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Intro Animation
        gsap.from('.fade-in', { y: 30, opacity: 0, duration: 1.5, stagger: 0.3, ease: "power3.out", delay: 0.5 });

    </script>
</body>
</html>
