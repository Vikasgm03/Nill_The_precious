<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make a Wish</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(180deg,#1a1026,#05020a);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
    color:white;
}

/* Cake */
.cake{
    position:relative;
    width:220px;
    height:180px;
    margin-bottom:40px;
}

.layer{
    position:absolute;
    width:220px;
    height:60px;
    border-radius:10px;
    left:0;
}

.layer1{ bottom:0; background:#f7d6e0;}
.layer2{ bottom:50px; background:#f3c1d4;}
.layer3{ bottom:100px; background:#e6a8c5;}

.icing{
    position:absolute;
    bottom:150px;
    width:220px;
    height:40px;
    background:#fff;
    border-radius:50% 50% 10px 10px;
}

/* Candles */
.candle{
    position:absolute;
    width:8px;
    height:30px;
    background:white;
    bottom:180px;
}

.flame{
    position:absolute;
    width:10px;
    height:15px;
    background:radial-gradient(circle,#fff 0%,orange 60%,transparent 70%);
    border-radius:50%;
    top:-15px;
    left:-1px;
    animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
    from{transform:scale(1);}
    to{transform:scale(1.2);}
}

/* Knife */
.knife{
    position:absolute;
    width:6px;
    height:160px;
    background:linear-gradient(to bottom,#ddd,#999);
    top:-200px;
    border-radius:3px;
}

/* Celebration */
.message{
    position:absolute;
    text-align:center;
    opacity:0;
    transform:scale(0.8);
}

h1{
    font-size:40px;
    margin:0;
}

button{
    padding:12px 30px;
    border:none;
    background:#d4af37;
    border-radius:30px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="cake" id="cake">
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
    <div class="icing"></div>

    <div class="candle" style="left:60px">
        <div class="flame"></div>
    </div>
    <div class="candle" style="left:100px">
        <div class="flame"></div>
    </div>
    <div class="candle" style="left:140px">
        <div class="flame"></div>
    </div>
</div>

<div class="knife" id="knife"></div>

<button onclick="cutCake()">TAP TO CUT</button>

<div class="message" id="message">
    <h1>Happy Birthday</h1>
    <h2>NITHYA ❤️</h2>
</div>

<script>
let cut = false;

function cutCake(){
    if(cut) return;
    cut = true;

    const knife = document.getElementById("knife");
    const flames = document.querySelectorAll(".flame");

    // Knife drop
    gsap.to(knife,{
        top:"100px",
        duration:0.5,
        ease:"power2.out",
        onComplete:()=>{
            // Blow flames
            flames.forEach(f=>{
                gsap.to(f,{scale:0,opacity:0,duration:0.3});
            });

            // Split cake
            gsap.to(".layer1",{x:-40,duration:1});
            gsap.to(".layer2",{x:-40,duration:1});
            gsap.to(".layer3",{x:-40,duration:1});
            gsap.to(".icing",{x:-40,duration:1});

            gsap.to("#cake",{scale:1.05,duration:1});

            // Confetti
            confetti({
                particleCount:150,
                spread:90,
                origin:{y:0.6}
            });

            // Show message
            gsap.to("#message",{opacity:1,scale:1,duration:1.5,delay:0.5});
        }
    });
}
</script>

</body>
</html>
